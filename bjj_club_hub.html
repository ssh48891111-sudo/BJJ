            { points: 4, action: 'Mount (마운트)', description: '상대의 몸통 위에 올라타 무릎이 바닥에 닿은 상태.' },
            { points: 3, action: 'Guard Pass (가드 패스)', description: '상대의 가드를 뚫고 사이드 컨트롤 등 상위 포지션을 점유한 상태.' },

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');

            const filteredTechniques = useMemo(() => {
                return techniques.filter(t => {
                    const nameMatch = t.name.toLowerCase().includes(searchTerm.toLowerCase());
                    const catMatch = selectedCategory === 'All' || t.category === selectedCategory;
                    return nameMatch && catMatch;
                });
            }, [searchTerm, selectedCategory]);

            const categories = ['All', 'Closed Guard', 'Half Guard', 'Open Guard', 'Pass', 'Submission', 'Takedown', 'Escape', 'Sweep'];

            const downloadMarkdown = () => {
                let mdContent = '# 주짓수 동아리 기술 보관소 (BJJ 100 Mastery)\n\n주짓수 동아리 회장님 전용 기술 집대성 파일입니다. 🤙\n\n---\n\n## 📚 기술 라이브러리 (Techniques)\n\n';
                
                const cats = ['Submission', 'Closed Guard', 'Half Guard', 'Open Guard', 'Pass', 'Sweep', 'Takedown', 'Escape'];
                
                cats.forEach(cat => {
                    const catTechs = techniques.filter(t => t.category === cat);
                    if (catTechs.length > 0) {
                        let icon = '🥋';
                        if (cat.includes('Guard')) icon = '🛡️';
                        else if (cat === 'Pass') icon = '🚀';
                        else if (cat === 'Sweep') icon = '🔄';
                        else if (cat === 'Takedown') icon = '🤼';
                        else if (cat === 'Escape') icon = '🚪';

                        mdContent += `### ${icon} ${cat}\n`;
                        mdContent += '| 기술명 | 난이도 | 설명 | 추천 연계기 |\n| :--- | :--- | :--- | :--- |\n';
                        catTechs.forEach(t => {
                            mdContent += `| **${t.name}** | ${t.difficulty} | ${t.description} | ${t.combination || '-'} |\n`;
                        });
                        mdContent += '\n';
                    }
                });

                mdContent += '---\n\n## 🏅 IBJJF 점수 체계\n\n';
                mdContent += '| 점수 | 포지션/액션 | 설명 |\n| :---: | :--- | :--- |\n';
                pointRules.forEach(rule => {
                    mdContent += `| **${rule.points} PTS** | **${rule.action}** | ${rule.description} |\n`;
                });

                const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'bjj_100_techniques_master.md';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

                                                    <path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4s-6.254,0-7.814,0.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z" />
                                                </svg>
                                                YOUTUBE 강의
                                            </a>
                                        </div>

                            <span className="px-4 py-1 border border-slate-500 rounded-full">NO-GI</span>

                        </div>
                        <p className="font-black text-slate-600 tracking-widest uppercase mb-2">BJJ 100 Technical Collective</p>
                        <p>&copy; 2026 주짓수 동아리 회장 전용 마스터 가이드. OSS! 🤙</p>

            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
